  <rect x="123" y="102" width="18" height="7" rx="1" fill="#1d4ed8"/>
  <rect x="144" y="102" width="18" height="7" rx="1" fill="#b91c1c"/>

  <!-- thin divider -->
  <line x1="30" y1="116" x2="151" y2="116" stroke="#1e3a5f" stroke-width="0.8"/>

  <!-- GCA monogram -->
  <text x="90.5" y="133"
        text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="34" font-weight="700" letter-spacing="-1"
        fill="#3b82f6" opacity="0.38">GCA</text>

  <!-- GeneCard — smaller than before -->
  <text x="90.5" y="150"
        text-anchor="middle"
        font-family="Arial, 'Helvetica Neue', sans-serif"
        font-size="18" font-weight="700" letter-spacing="0.5"
        fill="#f1f5f9">GeneCard</text>

  <!-- ANALYSIS — smaller -->
  <text x="90.5" y="162"
        text-anchor="middle"
        font-family="Arial, 'Helvetica Neue', sans-serif"
        font-size="10" font-weight="400" letter-spacing="3.5"
        fill="#60a5fa">ANALYSIS</text>

</g>

<!-- borders -->
<polygon points="90.5,6 170,50 170,140 90.5,184 11,140 11,50"
         fill="none" stroke="#3b82f6" stroke-width="3.5" opacity="0.8"/>
<polygon points="90.5,2 174,48 174,142 90.5,188 7,142 7,48"
         fill="none" stroke="#1e3a5f" stroke-width="2" opacity="0.5"/>

</svg>
